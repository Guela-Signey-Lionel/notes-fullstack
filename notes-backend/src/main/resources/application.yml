spring:
  application:
    name: notes-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5436/notes_db}
    username: ${DB_USERNAME:notes_user}
    password: ${DB_PASSWORD:notes_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8081}

app:
  jwt:
    secret: ${JWT_SECRET:507A723F4428472D4B6150645367566B5970337336763979244226452948404D}
    access-token-expiration: 86400000
    refresh-token-expiration: 604800000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://192.168.48.35:4200}
  mail:
    from: ${MAIL_FROM:noreply@pkfokam.edu}
    from-name: "PKFokam - Gestion des Notes"
  url: ${APP_URL:http://localhost:4200}

  # Barème mentions (paramétrable)
  bareme:
    passable: 10.0
    assez-bien: 12.0
    bien: 14.0
    tres-bien: 16.0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.notes: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
